# Toyxona agent — kamera paroli web sahifada kiritiladi

server_url: "http://SIZNING_VPS_IP:8080"
agent_id: "toyxona1"
agent_key: "AGENT_KALIT_1"

rtsp_publish_host: "SIZNING_VPS_IP"
rtsp_publish_port: 8554

subnet: null
scan_timeout: 5.0
scan_host_timeout: 1.0
scan_workers: 64
scan_retry: true

# Qo'lda kamera IP (scan ishlamasa):
# camera_hosts:
#   - "192.168.1.64"
sync_interval: 15

# Hikvision uchun transcode barqarorroq (Broken pipe oldini oladi)
ffmpeg_transcode: true
ffmpeg_quiet: false
ffmpeg_restart_cooldown: 20
