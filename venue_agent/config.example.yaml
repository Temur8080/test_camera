# ffmpeg: timestamp ogohlantirishlari bo'lsa video ishlayotgan bo'lsa OK
# ffmpeg_transcode: true   # muammo bo'lsa yoqing
# ffmpeg_quiet: true
ffmpeg_transcode: false
ffmpeg_quiet: false
